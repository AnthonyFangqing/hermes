server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve at /hermes/ to match GitHub Pages path
    location /hermes/ {
        try_files $uri $uri/ =404;
    }

    # Redirect root to /hermes/
    location = / {
        return 301 /hermes/;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
